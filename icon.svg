<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C6FF3D"/>
      <stop offset="1" stop-color="#36E0C8"/>
    </linearGradient>
  </defs>
  <!-- fundo a sangrar (maskable-safe) -->
  <rect width="512" height="512" fill="#0A0E1A"/>
  <!-- anel de marca -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#g)" stroke-width="20" opacity="0.95"/>
  <!-- barra superior da marca -->
  <rect x="176" y="150" width="160" height="16" rx="8" fill="url(#g)"/>
  <!-- número -->
  <text x="256" y="312" text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="150" font-weight="900" fill="#EAEEF7" letter-spacing="2">26</text>
</svg>
